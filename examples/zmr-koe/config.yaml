# Context Packer Configuration for zmr-koe Example
# This is a custom configuration optimized for the zmr-koe repository

# Output settings
format: zip  # Use ZIP format for this example
token_budget: 50000  # Smaller budget for demonstration (default: 100000)
output_path: ./output

# Scoring weights
semantic_weight: 0.7  # Prioritize semantic search for this example
pagerank_weight: 0.3

# File filtering
include_tests: false
include_patterns:
  - "**/*.ts"
  - "**/*.tsx"
  - "**/*.js"
  - "**/*.jsx"
  - "**/*.json"
  - "**/*.md"
exclude_patterns:
  - "*.min.js"
  - "*.min.css"
  - "node_modules/**"
  - "dist/**"
  - "build/**"
  - ".next/**"
  - "coverage/**"
  - "*.test.ts"
  - "*.test.js"
  - "*.spec.ts"
  - "*.spec.js"

# Backend selection
backends:
  vector_index: auto  # Try LEANN first, fallback to FAISS
  graph: auto         # Try igraph first, fallback to NetworkX
  embeddings: auto    # Try local first, fallback to API

# Embeddings configuration
embeddings:
  model: all-MiniLM-L6-v2
  device: cpu
  batch_size: 32
  api_provider: openai
  api_key_env: OPENAI_API_KEY

# Performance tuning
performance:
  max_workers: 4
  cache_embeddings: true
  incremental_index: true

# Logging configuration
logging:
  console_level: INFO
  file_level: DEBUG
  verbose: false

# Advanced options
advanced:
  pagerank_damping: 0.85
  changed_file_boost: 2.0
  pagerank_max_iterations: 100
  pagerank_tolerance: 0.0001
  min_file_size: 0
  max_file_size: 1000000
  validate_roundtrip: false
